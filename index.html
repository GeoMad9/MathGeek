<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Hero Adventure</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            text-align: center; background: #f0f4f8; margin: 0; padding: 10px;
        }
        #game-container { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; margin: auto; }
        .stats { display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; color: #00796b; margin-bottom: 10px; }
        #canvas { background: #ffffff; border-radius: 15px; border: 2px solid #e0e0e0; width: 100%; height: 180px; }
        .problem { font-size: 54px; margin: 15px 0; color: #333; font-weight: bold; }
        input { font-size: 32px; width: 120px; text-align: center; border: 4px solid #4fc3f7; border-radius: 15px; padding: 10px; outline: none; background: #e1f5fe; }
        .quote-box { margin-top: 15px; min-height: 70px; padding: 10px; font-size: 18px; line-height: 1.4; border-radius: 10px; }
        .btn-check { background: #4caf50; color: white; border: none; padding: 15px 40px; font-size: 22px; border-radius: 50px; margin-top: 15px; box-shadow: 0 4px #2e7d32; cursor: pointer; }
        .btn-check:active { box-shadow: 0 0; transform: translateY(4px); }
        .level-up { background: #fff9c4; border: 2px solid #fbc02d; color: #f57f17; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

        <span>Score: <span id="score">0</span></span>
        <span>Level: <span id="level">1</span></span>
    </div>
    <canvas id="canvas"></canvas>
    <div class="problem" id="question">? + ?</div>
    <input type="number" id="answer" pattern="\d*" placeholder="?">
    <br>
    <button class="btn-check" onclick="checkAnswer()">CHECK!</button>
    <div class="quote-box" id="quote">Ready, Buddy? Let's go!</div>
</div>
